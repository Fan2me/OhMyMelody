<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oh My Melody</title>
  <link rel="icon" href="./favicon.ico" sizes="any" />
  <meta name="theme-color" content="#1157d8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <style>
    :root {
      color-scheme: light;
      --bg: #edf3fb;
      --bg-accent: #fdf7ef;
      --panel: rgba(255, 255, 255, 0.84);
      --panel-border: rgba(54, 80, 130, 0.14);
      --text: #182332;
      --muted: #5e6a7b;
      --primary: #1157d8;
      --primary-strong: #0f419c;
      --secondary: #e7eefc;
      --shadow: 0 22px 56px rgba(19, 37, 70, 0.12);
      --code: #0d1728;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(17, 87, 216, 0.11), transparent 34%),
        radial-gradient(circle at bottom right, rgba(234, 141, 20, 0.09), transparent 28%),
        linear-gradient(180deg, var(--bg), var(--bg-accent));
    }

    main {
      width: calc(100% - 32px);
      margin: 0 auto;
      padding: 26px 0 42px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      -webkit-backdrop-filter: blur(14px);
      backdrop-filter: blur(14px);
    }

    .hero {
      margin-bottom: 18px;
      padding: 6px 2px 0;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 4vw, 50px);
      letter-spacing: 0.01em;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .subtitle,
    .copy,
    .hint {
      margin: 0;
      margin-top: 0.5rem;
      color: var(--muted);
      line-height: 1.65;
    }

    .row,
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .row {
      margin: 10px 0;
      align-items: center;
    }

    .toolbar {
      justify-content: space-between;
      align-items: center;
    }

    a,
    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      text-decoration: none;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
    }

    a,
    button.secondary {
      color: #17355f;
      background: var(--secondary);
    }

    button.primary {
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-strong));
    }

    a:hover,
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(17, 87, 216, 0.14);
    }

    a:disabled,
    button:disabled {
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      opacity: 0.42;
      filter: saturate(0.35);
    }

    button:disabled:hover {
      transform: none;
      box-shadow: none;
    }

    button.secondary:disabled {
      background: rgba(231, 238, 252, 0.72);
      color: rgba(23, 53, 95, 0.58);
    }

    button.primary:disabled {
      background: linear-gradient(135deg, rgba(17, 87, 216, 0.38), rgba(15, 65, 156, 0.38));
      color: rgba(255, 255, 255, 0.78);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(340px, 430px) minmax(0, 1fr);
      gap: 18px;
      margin-bottom: 18px;
      align-items: start;
      height: 96vh;
    }

    .controls {
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    .controls-scroll {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding-right: 4px;
    }

    .controls-scroll::-webkit-scrollbar {
      width: 8px;
    }

    .controls-scroll::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(94, 106, 123, 0.28);
    }

    .control-group+.control-group {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid rgba(54, 80, 130, 0.10);
    }

    label {
      display: inline-flex;
      flex-direction: column;
      gap: 6px;
      flex: 1 1 150px;
      min-width: 150px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .checkbox-label {
      flex-direction: row;
      align-items: center;
      min-width: auto;
      color: var(--text);
      gap: 8px;
    }

    input,
    select {
      width: 100%;
      border: 1px solid rgba(30, 41, 59, 0.14);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
    }

    input[type="range"] {
      border: 0;
      border-radius: 0;
      padding: 0;
      background: transparent;
      accent-color: var(--primary);
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      padding: 0;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .button-grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .control-value {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 84px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(232, 238, 252, 0.9);
      color: var(--primary-strong);
      font-weight: 800;
      white-space: nowrap;
    }

    .control-stack {
      display: grid;
      gap: 10px;
      width: 100%;
    }

    .control-hint-line {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .media-grid {
      display: grid;
      gap: 16px;
      height: 100%;
      min-height: 0;
      min-width: 0;
    }

    .audio-card {
      border-radius: 18px;
      padding: 0;
      background: rgba(245, 248, 255, 0.9);
      border: 1px solid rgba(54, 80, 130, 0.08);
      flex: 0 0 auto;
    }

    .audio-file-picker {
      position: relative;
      overflow: hidden;
      margin: 8px 0 12px;
      width: 100%;
      padding: 16px 18px;
      border: 2px dashed rgba(17, 87, 216, 0.38);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(17, 87, 216, 0.06), rgba(255, 255, 255, 0.58));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
      cursor: pointer;
    }

    .audio-file-picker:hover {
      border-color: rgba(17, 87, 216, 0.58);
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(17, 87, 216, 0.10), inset 0 1px 0 rgba(255, 255, 255, 0.72);
    }

    .audio-file-picker-title {
      font-weight: 800;
      font-size: 16px;
      margin-bottom: 6px;
      color: var(--primary-strong);
    }

    .audio-file-picker-text {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .audio-file-picker input[type="file"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .file-drop-active .audio-file-picker {
      border-color: rgba(17, 87, 216, 0.88);
      box-shadow: 0 0 0 4px rgba(17, 87, 216, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.8);
      transform: translateY(-1px);
    }

    .file-drop-hint {
      position: fixed;
      inset: 18px;
      z-index: 9999;
      display: grid;
      place-items: center;
      border: 2px dashed rgba(17, 87, 216, 0.62);
      border-radius: 28px;
      background: rgba(11, 24, 51, 0.74);
      box-shadow: 0 24px 70px rgba(8, 15, 34, 0.28);
      color: #fff;
      opacity: 0;
      transform: scale(0.985);
      pointer-events: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
    }

    .file-drop-hint[data-active="true"] {
      opacity: 1;
      transform: scale(1);
    }

    .file-drop-hint-card {
      width: min(540px, calc(100% - 36px));
      padding: 28px 24px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.06));
      border: 1px solid rgba(255, 255, 255, 0.16);
      text-align: center;
    }

    .file-drop-hint-title {
      font-size: clamp(22px, 3vw, 34px);
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }

    .file-drop-hint-text {
      margin: 0;
      color: rgba(235, 242, 255, 0.86);
      line-height: 1.65;
      font-size: 15px;
    }

    #audioPlayer {
      width: 100%;
      margin-top: 0;
    }

    #spectrumCanvasWrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      min-height: 0;
      flex: 1 1 auto;
      padding: 0;
      background: rgba(245, 248, 255, 0.9);
      border: 1px solid rgba(54, 80, 130, 0.08);
      overflow: hidden;
      border-radius: 18px;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.72),
        0 10px 24px rgba(19, 37, 70, 0.08);
    }

    .media {
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
      padding: 20px;
    }

    .media>.toolbar {
      flex: 0 0 auto;
    }

    .logs {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 20px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 96px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #12315f;
      background: rgba(232, 238, 252, 0.92);
      border: 1px solid rgba(36, 87, 245, 0.14);
    }

    .status-pill[data-status="running"] {
      color: #2457f5;
    }

    .status-pill[data-status="succeeded"] {
      color: #0f8b54;
    }

    .status-pill[data-status="failed"] {
      color: #b42318;
    }

    .status-pill[data-status="cancelled"] {
      color: #b86b00;
    }

    .status-pill[data-status="disposed"] {
      color: #6b7280;
    }

    pre {
      margin: 0;
      min-height: 120px;
      padding: 14px;
      border-radius: 16px;
      background: var(--code);
      color: #dce7ff;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.55;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 96vh;
      }

      .media-grid {
        height: auto;
      }

      .media {
        height: auto;
        overflow: visible;
      }
    }

    @media (max-width: 720px) {
      main {
        width: min(100% - 20px, 1260px);
        padding-top: 18px;
      }

      .button-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="layout">
      <article class="panel controls">
        <div class="controls-scroll">
          <div class="control-group">
            <div class="toolbar">
              <label for="modelName">
                <h2>模型</h2>
              </label>
              <span class="status-pill" id="uiStatus" data-status="idle">idle</span>
            </div>
            <div class="row">
              <select id="modelName"></select>
            </div>
          </div>

          <div class="control-group">
            <h2>音频输入</h2>
            <div class="row">
              <label class="checkbox-label">
                <input id="usePredictionCacheCheckbox" type="checkbox" checked />
                使用预测缓存
              </label>
            </div>
            <label class="audio-file-picker">
              <span class="audio-file-picker-title">选择音频文件</span>
              <span class="audio-file-picker-text">也可以把音频文件拖到这里。</span>
              <input id="audioFile" type="file" accept="audio/*" />
            </label>
            <div class="button-grid">
              <button id="startMicRecordBtn" class="secondary" type="button">开始录制</button>
              <button id="stopMicRecordBtn" class="secondary" type="button" disabled>停止录制</button>
              <button id="exportMicRecordBtn" class="secondary" type="button" disabled>导出录音</button>
            </div>
            <p id="micRecordStatus" class="hint">未录制</p>
          </div>

          <div class="control-group">
            <h2>播放控制</h2>
            <div class="control-stack">
              <label>
                歌曲速度
                <input id="playbackRateSlider" type="range" min="0.1" max="3" step="0.05" value="1" />
              </label>
              <div class="row">
                <span class="control-value" id="playbackRateValue">1.00x</span>
                <label class="checkbox-label">
                  <input id="abLoopEnabled" type="checkbox" />
                  启用 A/B 循环
                </label>
              </div>
              <div class="row">
                <label>
                  A 段
                  <input id="abLoopStart" type="text" value="未设置" readonly />
                </label>
                <label>
                  B 段
                  <input id="abLoopEnd" type="text" value="未设置" readonly />
                </label>
              </div>
              <div class="button-grid three">
                <button id="setLoopStartBtn" class="secondary" type="button">设为 A</button>
                <button id="setLoopEndBtn" class="secondary" type="button">设为 B</button>
                <button id="clearLoopBtn" class="secondary" type="button">清除循环</button>
              </div>
              <p class="control-hint-line">快捷键：Alt+A 设 A，Alt+B 设 B，Alt+L 开关循环，Alt+Shift+C 清除 A/B。</p>
            </div>
          </div>

          <div class="control-group">
            <h2>显示控制</h2>
            <div class="row">
              <label>
                Main
                <input id="mainEnabled" type="checkbox" checked />
              </label>
              <label>
                Overview
                <input id="overviewEnabled" type="checkbox" checked />
              </label>
            </div>
            <div class="row">
              <label>
                Main 刷新率
                <select id="mainFps">
                  <option value="24" selected>24</option>
                  <option value="30">30</option>
                  <option value="60">60</option>
                  <option value="120">120</option>
                  <option value="240">240</option>
                  <option value="0">unlimit</option>
                </select>
              </label>
              <label>
                Main Overlay 刷新率
                <select id="mainOverlayFps">
                  <option value="24">24</option>
                  <option value="30">30</option>
                  <option value="60">60</option>
                  <option value="120">120</option>
                  <option value="240">240</option>
                  <option value="0" selected>unlimit</option>
                </select>
              </label>
            </div>
            <div class="row">
              <label>
                Overview 刷新率
                <select id="overviewFps">
                  <option value="24" selected>24</option>
                  <option value="30">30</option>
                  <option value="60">60</option>
                  <option value="120">120</option>
                  <option value="240">240</option>
                  <option value="0">unlimit</option>
                </select>
              </label>
              <label>
                Overview Overlay 刷新率
                <select id="overviewOverlayFps">
                  <option value="24">24</option>
                  <option value="30">30</option>
                  <option value="60">60</option>
                  <option value="120">120</option>
                  <option value="240">240</option>
                  <option value="0" selected>unlimit</option>
                </select>
              </label>
            </div>
            <div class="row">
              <label>
                预测策略
                <select id="representativeMode">
                  <option value="first">first</option>
                  <option value="last">last</option>
                  <option value="first-valid">first-valid</option>
                  <option value="last-valid">last-valid</option>
                  <option value="highest-confidence" selected>highest-confidence</option>
                </select>
              </label>
            </div>
            <div class="row">
              <label>
                最小 UPS
                <select id="minUnitsPerSecond">
                  <option value="2">2</option>
                  <option value="5" selected>5</option>
                  <option value="8">8</option>
                  <option value="10">10</option>
                  <option value="12">12</option>
                  <option value="15">15</option>
                  <option value="20">20</option>
                </select>
              </label>
              <label>
                最大 UPS
                <select id="maxUnitsPerSecond">
                  <option value="20">20</option>
                  <option value="30">30</option>
                  <option value="40">40</option>
                  <option value="60">60</option>
                  <option value="80">80</option>
                  <option value="100" selected>100</option>
                </select>
              </label>
            </div>
            <div class="row">
              <label>
                最低音高
                <select id="pitchRangeMinNote"></select>
              </label>
              <label>
                最高音高
                <select id="pitchRangeMaxNote"></select>
              </label>
            </div>
          </div>

          <div class="control-group">
            <h2>调试信息</h2>
            <div class="row">
              <label class="checkbox-label">
                <input id="debugPanelEnabled" type="checkbox" checked />
                启用坐标调试面板
              </label>
            </div>
            <pre id="debugInfo">等待频谱数据...</pre>
          </div>
        </div>
      </article>

      <section class="media-grid">
        <article class="panel media">
          <div class="toolbar">
            <div>
              <h2>音频与频谱</h2>
            </div>
          </div>
          <div class="audio-card">
            <audio id="audioPlayer" controls preload="metadata"></audio>
          </div>
          <div id="spectrumCanvasWrapper"></div>
        </article>
      </section>
    </section>

  </main>

  <div id="fileDropHint" class="file-drop-hint" data-active="false" aria-hidden="true">
    <div class="file-drop-hint-card">
      <div class="file-drop-hint-title">松开文件即可导入</div>
      <p class="file-drop-hint-text">把音频文件拖到这个窗口里。</p>
    </div>
  </div>

  <script type="module" src="/src/index.ts"></script>
</body>

</html>
